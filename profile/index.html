<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Profile page RunSocial" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/images/favicon-16x16.png"
    />
    <link rel="manifest" href="/images/site.webmanifest" />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/script.js" defer></script>
    <title>RunSocial Profile</title>
  </head>
  <body
    class="bg-teal bg-opacity-10 min-h-screen grid grid-rows-[auto_1fr_auto]"
  >
    <header class="bg-white shadow-lg py-4">
      <nav class="container mx-auto text-lg font-normal">
        <div class="flex justify-between">
          <a href="/" class="flex items-center py-4 px-2">
            <video
              id="logo-video"
              src="/images/runsociallogo.mp4"
              autoplay
              muted
              class="w-16 h-16 rounded-full"
            ></video>
          </a>
          <div class="hidden md:flex items-center space-x-1">
            <a
              href="/"
              class="py-4 px-2 text-custom-pink font-normal hover:text-light-custom-pink transition duration-300"
              >Home</a
            >
            <a
              href="/profile/index.html"
              class="py-2 px-2 text-custom-pink border-b-2 border-custom-pink"
              >Profile</a
            >
            <a
              href="/feed/index.html"
              class="py-4 px-2 text-custom-pink font-normal hover:text-light-custom-pink transition duration-300"
              >Feed</a
            >
            <a
              href=""
              class="py-4 px-2 text-custom-pink font-normal hover:text-light-custom-pink transition duration-300"
              >About and Contact</a
            >
          </div>
          <div class="hidden md:flex items-center space-x-3">
            <a
              href="/"
              class="py-4 px-2 font-normal text-custom-pink rounded hover:bg-light-custom-pink hover:text-dark-gray transition duration-300"
              >Log out</a
            >
          </div>

          <div class="flex md:hidden items-center">
            <button class="mr-4" id="menu-btn">
              <svg
                class="w-8 h-8 text-custom-pink hover:bg-light-custom-pink hover:text-dark-gray"
                fill="none"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path d="M4 6h16M4 12h16M4 18h16"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="hidden" id="mobile-menu">
          <ul class="text-center">
            <li>
              <a
                href="/"
                class="block text-base py-4 px-2 hover:bg-light-custom-pink hover:text-dark-gray transition duration-300"
                >Home</a
              >
            </li>
            <li>
              <a
                href="/profile/index.html"
                class="block text-base py-4 px-2 bg-custom-pink text-white"
                >Profile</a
              >
            </li>
            <li>
              <a
                href="/feed/index.html"
                class="block text-base py-4 px-2 hover:bg-light-custom-pink hover:text-dark-gray transition duration-300"
                >RunDocial Feed</a
              >
            </li>
            <li>
              <a
                href="#"
                class="block text-base py-4 px-2 hover:bg-light-custom-pink hover:text-dark-gray transition duration-300"
                >Contact Us</a
              >
            </li>
            <li>
              <a
                href="/"
                class="block text-base py-4 px-2 hover:bg-light-custom-pink hover:text-dark-gray transition duration-300"
                >Log Out</a
              >
            </li>

          </ul>
        </div>
        
        </div>
      </nav>
    </header>
    <main class="container mx-auto my-7">
      <section>
        <h1 class="font-heading text-3xl font-thin text-red-600">Heading</h1>
        <p class="font-sans text-gray-500">Content</p>
      </section>
    </main>
    <footer class="font-sans bg-white py-5">
      <p class="container mx-auto text-center">Copyright &copy; 2024</p>
    </footer>
  </body>
</html>
