<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
    <title>Authentication page</title>
  </head>
  <body
    class="min-h-screen bg-cover bg-center relative flex flex-col"
    style="background-image: url('images/backgroundimage.jpg')"
  >
    <!-- Gradient Overlay -->
    <div
      class="absolute inset-0 bg-white opacity-60 pointer-events-none z-0"
    ></div>

    <!-- Content Wrapper -->
    <div class="relative z-10 flex-grow">
      <header
        class="bg-white shadow-lg py-4 flex items-center justify-center px-7"
      >
        <div class="flex items-center">
          <h1
            class="font-heading font-thin text-custom-pink text-3xl sm:text-4xl md:text-5xl py-4 mr-4"
          >
            Join our SOCIAL Running Community
          </h1>
          <video
            id="logo-video"
            src="images/runsociallogo.mp4"
            autoplay
            muted
            class="w-16 h-16 rounded-full"
          ></video>
        </div>
      </header>

      <main class="container mx-auto my-7 px-4">
        <section class="bg-light-gray bg-opacity-50 rounded-md mb-8">
          <h2
            class="text-3xl sm:text-4xl font-light text-center text-custom-pink py-4"
          >
            RunSocial
          </h2>
          <p class="text-xl text-dark-gray text-center px-4 sm:px-10 lg:px-60">
            Track your runs, stay motivated, boost performance, and celebrate
            your achievements with fellow SOCIAL runners!
          </p>
          <p class="text-lg text-dark-gray text-center py-6">
            Join the RunSocial Community - Log In or Sign Up today:
          </p>
        </section>

        <section>
          <form
            id="login-form"
            action="/profile"
            method="POST"
            class="space-y-4"
          >
            <div>
              <label
                for="login-email"
                class="block text-sm font-medium text-dark-gray"
                >Email</label
              >
              <input
                type="email"
                id="login-email"
                name="email"
                class="w-full p-3 mt-1 border rounded-md"
                required
                placeholder="Enter your email"
              />
            </div>

            <div>
              <label
                for="login-password"
                class="block text-sm font-medium text-dark-gray"
                >Password</label
              >
              <input
                type="password"
                id="login-password"
                name="password"
                class="w-full p-3 mt-1 border rounded-md"
                required
                minlength="8"
                placeholder="Enter your password"
              />
            </div>

            <div class="flex justify-between items-center">
              <a href="/" class="text-sm text-blue-600">Forgot Password?</a>
            </div>

            <button
              type="submit"
              class="w-full bg-teal text-button-grey shadow-sm font-semibold p-3 rounded-md hover:bg-hover-teal hover:text-white"
            >
              Log In
            </button>

            <div class="mt-4 text-center">
              <span>Don't have an account?</span>
              <button type="button" id="show-register" class="text-blue-600">
                Sign Up
              </button>
            </div>
          </form>

          <!-- Registration Form -->
          <form
            id="register-form"
            action="/profile"
            method="POST"
            class="space-y-4 hidden"
          >
            <div>
              <label
                for="register-username"
                class="block text-sm font-medium text-dark-gray"
                >Username</label
              >
              <input
                type="text"
                id="register-username"
                name="username"
                class="w-full p-3 mt-1 border rounded-md"
                required
                placeholder="Choose a username"
              />
            </div>

            <div>
              <label
                for="register-email"
                class="block text-sm font-medium text-dark-gray"
                >Email</label
              >
              <input
                type="email"
                id="register-email"
                name="email"
                class="w-full p-3 mt-1 border rounded-md"
                required
                placeholder="Enter your email"
              />
            </div>

            <div>
              <label
                for="register-password"
                class="block text-sm font-medium text-dark-gray"
                >Password</label
              >
              <input
                type="password"
                id="register-password"
                name="password"
                class="w-full p-3 mt-1 border rounded-md"
                required
                minlength="8"
                placeholder="Enter a password (min 8 characters)"
              />
            </div>

            <div>
              <label
                for="confirm-password"
                class="block text-sm font-medium text-dark-gray"
                >Confirm Password</label
              >
              <input
                type="password"
                id="confirm-password"
                name="confirm-password"
                class="w-full p-3 mt-1 border rounded-md"
                required
                minlength="8"
                placeholder="Confirm your password"
              />
            </div>

            <button
              type="submit"
              class="w-full bg-teal text-button-grey shadow-sm font-semibold p-3 rounded-md hover:bg-hover-teal hover:text-white"
            >
              Sign Up
            </button>

            <div class="mt-4 text-center">
              <span>Already have an account?</span>
              <button type="button" id="show-login" class="text-blue-600">
                Log In
              </button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <!-- Footer -->
    <footer class="font-sans bg-white py-5 mt-auto z-10">
      <p class="container mx-auto text-center">Copyright &copy; 2024</p>
    </footer>
  </body>
</html>
